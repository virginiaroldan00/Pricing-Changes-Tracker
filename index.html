<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing Changes Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0D0D14; --surface: #16161F; --surface2: #1E1E2C;
    --border: #2A2A3C; --green: #34D186; --green-dim: #1a6b43;
    --amber: #FBBF24; --amber-dim: #78560a;
    --text: #E8E8F0; --muted: #6B6B85; --radius: 10px;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; display: flex; flex-direction: column; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; }
  header .logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  header .logo span.bolt { color: var(--green); }
  header .subtitle { color: var(--muted); font-size: 13px; }

  .btn { background: var(--green); color: #000; border: none; border-radius: 8px; padding: 9px 18px; font-weight: 600; font-size: 13px; cursor: pointer; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn.secondary:hover { background: var(--border); }
  .btn.amber { background: var(--amber); color: #000; }
  .btn.sm { padding: 5px 10px; font-size: 11px; border-radius: 6px; }

  .layout { display: grid; grid-template-columns: 1fr 400px; flex: 1; }
  .left-panel { padding: 24px 28px; overflow-y: auto; }
  .right-panel { background: var(--surface); border-left: 1px solid var(--border); padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

  /* Calendar */
  .calendar-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .calendar-nav h2 { font-size: 20px; font-weight: 700; flex: 1; }
  .nav-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .nav-btn:hover { background: var(--border); }

  .calendar-grid { display: grid; grid-template-columns: 34px repeat(7, 1fr); gap: 4px; }
  .day-header { text-align: center; color: var(--muted); font-size: 11px; font-weight: 600; padding: 6px 0; text-transform: uppercase; letter-spacing: 0.5px; }
  .week-num-header { font-size: 10px; font-weight: 700; color: #4A4A62; padding: 6px 0; text-align: center; text-transform: uppercase; letter-spacing: 0.3px; }
  .week-num-cell { display: flex; align-items: flex-start; justify-content: center; padding-top: 9px; font-size: 10px; font-weight: 700; color: #4A4A62; letter-spacing: 0.3px; }
  .day-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; min-height: 90px; padding: 8px 6px 6px; transition: border-color 0.15s; position: relative; }
  .day-cell.has-events { cursor: pointer; }
  .day-cell.has-events:hover { border-color: var(--green); }
  .day-cell.today { border-color: var(--green-dim); }
  .day-cell.empty { background: transparent; border-color: transparent; }
  .day-num { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 5px; }
  .day-cell.today .day-num { color: var(--green); }

  .city-pills { display: flex; flex-direction: column; gap: 3px; }
  .city-pill { border-radius: 4px; padding: 2px 6px; font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 3px solid; }
  .review-pill { border-radius: 4px; padding: 2px 6px; font-size: 10px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: #FBBF2420; color: var(--amber); border-left: 3px solid var(--amber); display: flex; align-items: center; gap: 3px; }
  .review-pill.overdue { background: #ef444420; color: #ef4444; border-left-color: #ef4444; }

  /* Legend */
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; padding: 12px 14px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; cursor: pointer; padding: 3px 8px; border-radius: 6px; transition: background 0.15s; border: 1px solid transparent; }
  .legend-item:hover { background: var(--surface2); }
  .legend-item.active { background: var(--surface2); border-color: var(--border); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  /* Right panel sections */
  .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 10px; }
  .panel-month-title { font-size: 16px; font-weight: 700; color: var(--green); }

  .city-select { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 9px 12px; font-size: 13px; cursor: pointer; margin-bottom: 10px; }

  /* Review alerts */
  .review-alert { background: #FBBF2410; border: 1px solid var(--amber-dim); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px; }
  .review-alert.overdue { background: #ef444410; border-color: #7f1d1d; }
  .review-alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .review-alert-body { flex: 1; min-width: 0; }
  .review-alert-city { font-weight: 700; font-size: 13px; }
  .review-alert-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .review-alert-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .no-reviews { color: var(--muted); font-size: 12px; text-align: center; padding: 12px; }

  /* Change cards */
  .change-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; transition: border-color 0.15s; }
  .change-card:hover { border-color: #3A3A50; }
  .change-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .change-city-badge { display: inline-flex; align-items: center; gap: 6px; font-weight: 700; font-size: 13px; }
  .change-date { font-size: 11px; color: var(--muted); }
  .change-notes { font-size: 12px; color: var(--text); line-height: 1.6; white-space: pre-wrap; margin-bottom: 10px; }
  .card-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .review-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--amber); background: #FBBF2415; border: 1px solid var(--amber-dim); border-radius: 5px; padding: 3px 8px; }
  .review-badge.overdue { color: #ef4444; background: #ef444415; border-color: #7f1d1d; }
  .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 3px 6px; border-radius: 4px; transition: color 0.15s, background 0.15s; }
  .icon-btn:hover { color: var(--text); background: var(--border); }
  .icon-btn.danger:hover { color: #ef4444; background: #ef444420; }
  .icon-btn.edit:hover { color: var(--green); background: var(--green-dim); }
  .empty-state { text-align: center; color: var(--muted); padding: 32px 16px; font-size: 13px; }

  /* Modals */
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 500px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: 13px; font-family: inherit; resize: vertical; transition: border-color 0.15s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--green); }
  .form-group textarea { min-height: 120px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

  /* Review modal */
  .copy-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 12px; color: var(--text); line-height: 1.6; white-space: pre-wrap; margin-top: 10px; font-family: monospace; }
  .copy-success { color: var(--green); font-size: 12px; margin-top: 6px; display: none; }

  /* Day modal */
  .day-modal-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }

::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .right-panel { border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="bolt">Bolt</span> Pricing Tracker</div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="subtitle" id="total-label"></span>
    <button class="btn secondary" onclick="exportData()" title="Exportar datos">⬇ Exportar</button>
    <button class="btn secondary" onclick="document.getElementById('import-input').click()" title="Importar datos">⬆ Importar</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn" onclick="openAddModal()">+ Añadir cambio</button>
  </div>
</header>

<div class="layout">
  <div class="left-panel">
    <div class="calendar-nav">
      <button class="nav-btn" onclick="prevMonth()">&#8249;</button>
      <h2 id="month-label"></h2>
      <button class="nav-btn" onclick="nextMonth()">&#8250;</button>
    </div>
    <div class="legend" id="legend"></div>
    <div class="calendar-grid" id="calendar"></div>
  </div>

  <div class="right-panel">
    <div style="margin-bottom:4px;">
      <div class="section-title" onclick="toggleReviews()" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;">
        <span>Revisiones pendientes</span>
        <span id="reviews-toggle" style="font-size:10px;transition:transform 0.2s;display:inline-block;transform:rotate(180deg);">▲</span>
      </div>
      <div id="reviews-section" style="display:none;"></div>
    </div>
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div class="section-title">Historial</div>
        <select class="city-select" id="city-filter" onchange="renderRightPanel()" style="width:auto;margin:0;padding:6px 10px;font-size:12px;"></select>
      </div>
      <div id="changes-list"></div>
    </div>
  </div>
</div>

<!-- Add Change Modal -->
<div class="modal-backdrop" id="add-modal">
  <div class="modal">
    <h3 id="add-modal-title">Añadir cambio de pricing</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Ciudad</label>
        <input type="text" id="input-city" placeholder="ej. Madrid" list="cities-datalist">
        <datalist id="cities-datalist"></datalist>
      </div>
      <div class="form-group">
        <label>Fecha del cambio</label>
        <input type="date" id="input-date">
      </div>
    </div>
    <div class="form-group">
      <label>Descripción y motivo</label>
      <textarea id="input-notes" placeholder="Qué cambios hiciste y por qué..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>🔔 Fecha de revisión (opcional)</label>
        <input type="date" id="input-review">
      </div>
      <div class="form-group" style="display:flex;align-items:flex-end;">
        <button class="btn secondary sm" type="button" onclick="setReviewIn7Days()" style="width:100%;padding:10px 12px;font-size:12px;">+7 días</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeAddModal()">Cancelar</button>
      <button class="btn" onclick="saveChange()">Guardar</button>
    </div>
  </div>
</div>

<!-- Review Modal -->
<div class="modal-backdrop" id="review-modal">
  <div class="modal">
    <h3>🔔 Fijar revisión</h3>
    <div id="review-modal-city-name" style="font-size:13px;color:var(--muted);margin-bottom:16px;"></div>
    <div class="form-group">
      <label>Fecha de revisión</label>
      <input type="date" id="review-input-date">
    </div>
    <div id="slack-msg-section" style="display:none;">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">Copia este mensaje y pégalo en el chat para programar el aviso de Slack:</div>
      <div class="copy-box" id="slack-msg-box"></div>
      <div class="copy-success" id="copy-success">✓ Copiado al portapapeles</div>
    </div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeReviewModal()">Cancelar</button>
      <button class="btn secondary" onclick="generateSlackMsg()">Generar mensaje Slack</button>
      <button class="btn amber" onclick="saveReview()">Guardar revisión</button>
    </div>
  </div>
</div>

<!-- Day Modal -->
<div class="modal-backdrop" id="day-modal">
  <div class="modal">
    <div class="day-modal-title" id="day-modal-title"></div>
    <div id="day-modal-content"></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeDayModal()">Cerrar</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'bolt_pricing_v2';

const CITY_COLORS = {
  alicante:'#FF6B6B', valencia:'#4ECDC4', coruna:'#A78BFA',
  zaragoza:'#FBBF24', madrid:'#60A5FA', barcelona:'#F97316',
  sevilla:'#34D186', bilbao:'#EC4899', malaga:'#14B8A6'
};
const COLOR_POOL = ['#FF6B6B','#4ECDC4','#A78BFA','#60A5FA','#F97316','#34D186','#EC4899','#14B8A6','#94A3B8'];
const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAY_NAMES = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

const SEED_DATA = [
  {"id":"s1","city":"Alicante","date":"2026-05-06","review":"","notes":"He aumentado los slots de peak hours añadiendo entre semana y modificado los del fin de semana añadiendo también los domingos. Eran slots donde más demanda había, con un search coverage más bajo y ATA altos.\n\nWeekdays: +10% (sobre precio general)\nWeekend: +27% (sobre precio general)"},
  {"id":"s2","city":"Valencia","date":"2026-05-06","review":"","notes":"Misma lógica que Alicante — aumento de peak hours entre semana y fin de semana incluyendo domingos. Slots de alta demanda con search coverage bajo y ATA altos.\n\nWeekdays: +9.4% (sobre precio base)\nWeekend: +32% (sobre precio base)"},
  {"id":"s3","city":"Coruña","date":"2026-04-30","review":"","notes":"En general, la utilización no es muy alta. Hay un gap claro de mejora a revisar con DC.\n\nWeekdays:\n• Lunes a viernes (7:00–8:00): baja conversión → -12%\n• Lunes a jueves (15:00–18:00): ampliado y bajado → -12%\n• Lunes a jueves (23:00): añadido como peak hour\n\nWeekend:\n• Sábado y domingo (00:00–07:30): ampliado, utilización ~55% → -11%\n• Viernes a domingo (15:00–23:00): baja conversión → -11%"},
  {"id":"s4","city":"Zaragoza","date":"2026-04-29","review":"","notes":"Peak hours entre semana: -8%.\nJueves: peak hour empieza 1h más tarde (14:00 → 15:00).\nFin de semana 00:00–08:00: ligero aumento de price/min.\nFin de semana y viernes por las tardes: -15% porque no estábamos convirtiendo."},
  {"id":"ch-1779370250518","city":"Zaragoza","date":"2026-05-21","notes":"De lunes a miércoles he reducido de un 8% a +4% sobre tarifa base\nDomingos de 00 - 8am de 52% a 32% sobre tarifa base","review":"2026-06-10"},
  {"id":"ch-1779441523234","city":"Alicante","date":"2026-05-22","notes":"Se redujo el demand spend de 20 a 8% generando una caida del EPH del 18% se ha aumentado el garantizado (supply spend) un 6,6%","review":"2026-05-29"},
  {"id":"ch-1779964151043","city":"Toledo","date":"2026-05-28","notes":"Aumento del 15% por el corpus christi Viernes sabado y semana que viene miercoles a domingo","review":"2026-06-04"},
  {"id":"ch-1780477162762","city":"Toledo","date":"2026-06-03","notes":"Guadalajara - Aumento de precios un 12/14% precio base y un +3.4% en peak hours\n\nPor las multas y compensar el que los coches no se quieran conectar","review":"2026-06-10"},
  {"id":"ch-1780482869081","city":"Coruña","date":"2026-06-03","notes":"Podríamos plantear bajar el override en Coruña: 8km a 5km\n\nGoal-->  bajar ETAs, aumentar aceptación y S2O","review":"2026-06-10"},
  {"id":"ch-1780502685913","city":"Alicante","date":"2026-06-03","notes":"Bajada de precios en PH","review":"2026-06-10"},
  {"id":"ch-1781277346425","city":"Alicante","date":"2026-06-15","notes":"SR Se ha desactivado benidorm y torrevieja","review":"2026-06-22"},
  {"id":"ch-1781792515230","city":"Alicante","date":"2026-06-23","notes":"San Juan","review":""},
  {"id":"ch-1781792530410","city":"Valencia","date":"2026-06-23","notes":"SAN JUAN","review":""},
  {"id":"ch-1781792539085","city":"Coruña","date":"2026-06-23","notes":"SAN JUAN","review":""},
  {"id":"ch-1782312268139","city":"Sevilla","date":"2026-06-24","notes":"Reducción PH:\n* -13% vs versión anterior (de estar a un 35% s/total a 19%)\n* 17% a un 9% (noche del viernes) \n\nQueremos ver si estasmo consiguiendo aumentar S2O pero sin afectar acceptance rate (si me he pasado diria que es en el del 9%) - la bajada ha sido en el min price estaba en 12€ lo baje a 9€","review":"2026-07-01"},
  {"id":"ch-1782461224546","city":"Alicante","date":"2026-06-26","notes":"Añadimos el aumento de precio comentado con Emmanuel","review":"2026-07-03"},
  {"id":"ch-1782461252679","city":"Valencia","date":"2026-06-26","notes":"Añadimos cambio cometnado con Emmanuele","review":"2026-07-03"}
];

let changes = loadData();
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let selectedFilter = '';
let colorCache = {};
let reviewTargetId = null;

function loadData() {
  try {
    const r = localStorage.getItem(STORAGE_KEY);
    if(r) {
      const parsed = JSON.parse(r);
      if(parsed.length > SEED_DATA.length) return parsed;
    }
  } catch(e){}
  return SEED_DATA.map(d=>({...d}));
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(changes)); } catch(e){}
}

function normalizeCity(city) {
  return city.trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z]/g,'');
}
function getCityColor(city) {
  const k = normalizeCity(city);
  if(CITY_COLORS[k]) return CITY_COLORS[k];
  if(colorCache[k]) return colorCache[k];
  const used = Object.values(colorCache);
  const c = COLOR_POOL.find(x=>!used.includes(x)) || COLOR_POOL[Object.keys(colorCache).length % COLOR_POOL.length];
  colorCache[k] = c;
  return c;
}
function formatDate(d) {
  if(!d) return '';
  const [y,m,day] = d.split('-');
  return `${parseInt(day)} de ${MONTH_NAMES[parseInt(m)-1]} de ${y}`;
}
function today() { return new Date().toISOString().split('T')[0]; }
function addDays(dateStr, n) {
  const d = new Date(dateStr); d.setDate(d.getDate()+n);
  return d.toISOString().split('T')[0];
}
function isOverdue(dateStr) { return dateStr && dateStr < today(); }
function isToday(dateStr) { return dateStr === today(); }

function uniqueCities() {
  const seen = new Set();
  return changes.map(c=>c.city).filter(c=>{ const k=c.toLowerCase(); if(seen.has(k)) return false; seen.add(k); return true; });
}

// ── CALENDAR ────────────────────────────────────────────────────────────────
function renderCalendar() {
  document.getElementById('month-label').textContent = `${MONTH_NAMES[currentMonth]} ${currentYear}`;
  const grid = document.getElementById('calendar');
  grid.innerHTML = '';

  // Week number header
  const wh=document.createElement('div'); wh.className='week-num-header'; wh.textContent='W#'; grid.appendChild(wh);
  DAY_NAMES.forEach(d => { const el=document.createElement('div'); el.className='day-header'; el.textContent=d; grid.appendChild(el); });

  const firstDow = new Date(currentYear,currentMonth,1).getDay();
  const startDow = firstDow===0?6:firstDow-1;
  const daysInMonth = new Date(currentYear,currentMonth+1,0).getDate();
  const todayStr = today();

  function getISOWeek(date) {
    const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
    const day=d.getUTCDay()||7; d.setUTCDate(d.getUTCDate()+4-day);
    const y=new Date(Date.UTC(d.getUTCFullYear(),0,1));
    return Math.ceil((((d-y)/86400000)+1)/7);
  }
  function addWeekNumCell(date){
    const wc=document.createElement('div'); wc.className='week-num-cell';
    wc.textContent='W.'+getISOWeek(date); grid.appendChild(wc);
  }

  // First row week number
  addWeekNumCell(new Date(currentYear,currentMonth,1));
  for(let i=0;i<startDow;i++){ const e=document.createElement('div'); e.className='day-cell empty'; grid.appendChild(e); }

  let col=startDow;
  for(let day=1;day<=daysInMonth;day++){
    if(col===0 && day>1) addWeekNumCell(new Date(currentYear,currentMonth,day));
    const dateStr=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dayChanges = changes.filter(c=>c.date===dateStr);
    const dayReviews = changes.filter(c=>c.review===dateStr);
    const isT = dateStr===todayStr;

    const cell=document.createElement('div');
    cell.className='day-cell'+(isT?' today':'')+(dayChanges.length||dayReviews.length?' has-events':'');

    const numEl=document.createElement('div'); numEl.className='day-num'; numEl.textContent=day; cell.appendChild(numEl);

    const pills=document.createElement('div'); pills.className='city-pills';
    dayChanges.forEach(ch=>{
      const p=document.createElement('div'); p.className='city-pill';
      const color=getCityColor(ch.city);
      p.style.color=color; p.style.background=color+'22'; p.style.borderLeftColor=color;
      p.textContent=ch.city; pills.appendChild(p);
    });
    dayReviews.forEach(ch=>{
      const p=document.createElement('div');
      p.className='review-pill'+(isOverdue(ch.review)?' overdue':'');
      p.innerHTML='🔔 '+ch.city; pills.appendChild(p);
    });
    cell.appendChild(pills);

    if(dayChanges.length||dayReviews.length) cell.onclick=()=>openDayModal(dateStr,dayChanges,dayReviews);
    grid.appendChild(cell);
    col=(col+1)%7;
  }
}

function prevMonth(){ if(currentMonth===0){currentMonth=11;currentYear--;}else currentMonth--; renderCalendar(); renderRightPanel(); }
function nextMonth(){ if(currentMonth===11){currentMonth=0;currentYear++;}else currentMonth++; renderCalendar(); renderRightPanel(); }

// ── LEGEND ──────────────────────────────────────────────────────────────────
function renderLegend(){
  const lg=document.getElementById('legend');
  lg.innerHTML='';
  const cities=uniqueCities();
  if(!cities.length){lg.style.display='none';return;}
  lg.style.display='flex';
  cities.forEach(city=>{
    const item=document.createElement('div');
    item.className='legend-item'+(selectedFilter===city?' active':'');
    item.onclick=()=>{ selectedFilter=selectedFilter===city?'':city; document.getElementById('city-filter').value=selectedFilter; renderLegend(); renderRightPanel(); };
    const dot=document.createElement('div'); dot.className='legend-dot'; dot.style.background=getCityColor(city);
    item.appendChild(dot); item.appendChild(document.createTextNode(city)); lg.appendChild(item);
  });
}

// ── RIGHT PANEL ─────────────────────────────────────────────────────────────
function renderRightPanel(){
  selectedFilter=document.getElementById('city-filter').value;
  renderReviews();
  renderChangesList();
  updateTotalLabel();
}

function renderReviews(){
  const sec=document.getElementById('reviews-section');
  const pending=changes.filter(c=>c.review).sort((a,b)=>a.review.localeCompare(b.review));
  if(!pending.length){ sec.innerHTML='<div class="no-reviews">Sin revisiones programadas</div>'; return; }

  sec.innerHTML='';
  pending.forEach(ch=>{
    const od=isOverdue(ch.review);
    const tod=isToday(ch.review);
    const color=getCityColor(ch.city);
    const div=document.createElement('div');
    div.className='review-alert'+(od?' overdue':'');
    div.innerHTML=`
      <div class="review-alert-icon">${od?'⚠️':tod?'🔔':'🕐'}</div>
      <div class="review-alert-body">
        <div class="review-alert-city" style="color:${color}">${ch.city}</div>
        <div class="review-alert-date">${od?'<span style="color:#ef4444">Vencida —</span> ':tod?'<span style="color:var(--amber)">Hoy —</span> ':''}Revisar el ${formatDate(ch.review)}</div>
        <div class="review-alert-actions">
          <button class="btn amber sm" onclick="copySlackMsg('${ch.id}')">📋 Copiar msg Slack</button>
          <button class="btn secondary sm" onclick="openReviewModal('${ch.id}')">Editar</button>
          <button class="btn secondary sm" onclick="clearReview('${ch.id}')">✕ Quitar</button>
        </div>
      </div>`;
    sec.appendChild(div);
  });
}

const monthOpenState = {};

function buildChangeCard(ch) {
  const color = getCityColor(ch.city);
  const hasReview = !!ch.review;
  const od = isOverdue(ch.review);

  const card = document.createElement('div');
  card.className = 'change-card';
  card.style.marginBottom = '10px';

  const header = document.createElement('div');
  header.className = 'change-card-header';

  const badge = document.createElement('div');
  badge.className = 'change-city-badge';
  const dot = document.createElement('div');
  dot.style.cssText = `width:10px;height:10px;border-radius:3px;background:${color};flex-shrink:0`;
  const citySpan = document.createElement('span');
  citySpan.style.color = color;
  citySpan.textContent = ch.city;
  badge.appendChild(dot); badge.appendChild(citySpan);

  const rightSide = document.createElement('div');
  rightSide.style.cssText = 'display:flex;align-items:center;gap:6px;';
  const dateSpan = document.createElement('span');
  dateSpan.className = 'change-date';
  dateSpan.textContent = formatDate(ch.date);

  const editBtn = document.createElement('button');
  editBtn.className = 'icon-btn edit'; editBtn.title = 'Editar'; editBtn.textContent = '✎';
  editBtn.addEventListener('click', () => editChange(ch.id));

  const delBtn = document.createElement('button');
  delBtn.className = 'icon-btn danger'; delBtn.title = 'Eliminar'; delBtn.textContent = '✕';
  delBtn.addEventListener('click', () => deleteChange(ch.id));

  rightSide.appendChild(dateSpan); rightSide.appendChild(editBtn); rightSide.appendChild(delBtn);
  header.appendChild(badge); header.appendChild(rightSide);

  const notes = document.createElement('div');
  notes.className = 'change-notes';
  notes.textContent = ch.notes;

  const actions = document.createElement('div');
  actions.className = 'card-actions';

  if(hasReview){
    const b2 = document.createElement('span');
    b2.className = 'review-badge' + (od ? ' overdue' : '');
    b2.textContent = '🔔 Rev. ' + formatDate(ch.review);
    actions.appendChild(b2);
  }
  const revBtn = document.createElement('button');
  revBtn.className = 'btn secondary sm';
  revBtn.textContent = hasReview ? 'Editar revisión' : '+ Fijar revisión';
  revBtn.addEventListener('click', () => openReviewModal(ch.id));
  actions.appendChild(revBtn);
  if(hasReview){
    const slackBtn = document.createElement('button');
    slackBtn.className = 'btn amber sm'; slackBtn.textContent = '📋 Msg Slack';
    slackBtn.addEventListener('click', () => copySlackMsg(ch.id));
    actions.appendChild(slackBtn);
  }

  card.appendChild(header); card.appendChild(notes); card.appendChild(actions);
  return card;
}

function renderChangesList(){
  const filtered = changes.filter(c => selectedFilter ? c.city === selectedFilter : true);
  const sorted = [...filtered].sort((a,b) => b.date.localeCompare(a.date));
  const list = document.getElementById('changes-list');
  list.innerHTML = '';

  if(!sorted.length){ list.innerHTML='<div class="empty-state">No hay cambios registrados.</div>'; return; }

  // Group by year-month
  const groups = {};
  sorted.forEach(ch => {
    const key = ch.date.slice(0,7); // "2026-06"
    if(!groups[key]) groups[key] = [];
    groups[key].push(ch);
  });

  const currentMonthKey = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;

  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(key => {
    const [y, m] = key.split('-');
    const label = `${MONTH_NAMES[parseInt(m)-1]} ${y}`;
    const isOpen = key in monthOpenState ? monthOpenState[key] : false;
    monthOpenState[key] = isOpen;

    // Section header
    const section = document.createElement('div');
    section.style.marginBottom = '12px';

    const secHeader = document.createElement('div');
    secHeader.style.cssText = 'display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;user-select:none;';

    const secLabel = document.createElement('span');
    secLabel.style.cssText = 'font-size:13px;font-weight:700;color:var(--text);';
    secLabel.textContent = label;

    const secCount = document.createElement('span');
    secCount.style.cssText = 'font-size:11px;color:var(--muted);margin-left:8px;';
    secCount.textContent = `${groups[key].length} cambio${groups[key].length!==1?'s':''}`;

    const secArrow = document.createElement('span');
    secArrow.style.cssText = 'font-size:10px;color:var(--muted);transition:transform 0.2s;display:inline-block;margin-left:auto;';
    secArrow.textContent = '▲';
    if(!isOpen) secArrow.style.transform = 'rotate(180deg)';

    const leftSide = document.createElement('div');
    leftSide.style.display = 'flex'; leftSide.style.alignItems = 'center'; leftSide.style.gap = '6px';
    leftSide.appendChild(secLabel); leftSide.appendChild(secCount);
    secHeader.appendChild(leftSide); secHeader.appendChild(secArrow);

    const secBody = document.createElement('div');
    secBody.style.display = isOpen ? '' : 'none';
    groups[key].forEach(ch => secBody.appendChild(buildChangeCard(ch)));

    secHeader.addEventListener('click', () => {
      const open = secBody.style.display === 'none';
      secBody.style.display = open ? '' : 'none';
      secArrow.style.transform = open ? '' : 'rotate(180deg)';
      monthOpenState[key] = open;
    });

    section.appendChild(secHeader);
    section.appendChild(secBody);
    list.appendChild(section);
  });
}

function updateTotalLabel(){
  const n=changes.length;
  document.getElementById('total-label').textContent=`${n} cambio${n!==1?'s':''} registrado${n!==1?'s':''}`;
}

// ── ADD / EDIT MODAL ─────────────────────────────────────────────────────────
let editingId = null;

function openAddModal(){
  editingId = null;
  document.getElementById('add-modal-title').textContent = 'Añadir cambio de pricing';
  document.getElementById('input-city').value='';
  document.getElementById('input-date').value=today();
  document.getElementById('input-notes').value='';
  document.getElementById('input-review').value='';
  document.getElementById('add-modal').classList.add('open');
}

function editChange(id){
  const ch = changes.find(c=>c.id===id);
  editingId = id;
  document.getElementById('add-modal-title').textContent = 'Editar cambio — ' + ch.city;
  document.getElementById('input-city').value = ch.city;
  document.getElementById('input-date').value = ch.date;
  document.getElementById('input-notes').value = ch.notes;
  document.getElementById('input-review').value = ch.review||'';
  document.getElementById('add-modal').classList.add('open');
}

function closeAddModal(){ document.getElementById('add-modal').classList.remove('open'); editingId=null; }
function setReviewIn7Days(){ document.getElementById('input-review').value=addDays(document.getElementById('input-date').value||today(),7); }

function saveChange(){
  const city=document.getElementById('input-city').value.trim();
  const date=document.getElementById('input-date').value;
  const notes=document.getElementById('input-notes').value.trim();
  const review=document.getElementById('input-review').value;
  if(!city||!date||!notes){alert('Rellena ciudad, fecha y descripción.');return;}
  if(editingId){
    const ch=changes.find(c=>c.id===editingId);
    ch.city=city; ch.date=date; ch.notes=notes; ch.review=review;
  } else {
    changes.push({id:'ch-'+Date.now(),city,date,notes,review});
  }
  saveData(); closeAddModal(); updateAll();
}

function deleteChange(id){
  if(!confirm('¿Eliminar este cambio?')) return;
  changes=changes.filter(c=>c.id!==id);
  saveData(); updateAll();
}

// ── REVIEW MODAL ─────────────────────────────────────────────────────────────
function openReviewModal(id){
  reviewTargetId=id;
  const ch=changes.find(c=>c.id===id);
  document.getElementById('review-modal-city-name').textContent=`Ciudad: ${ch.city} — Cambio del ${formatDate(ch.date)}`;
  document.getElementById('review-input-date').value=ch.review||addDays(ch.date,7);
  document.getElementById('slack-msg-section').style.display='none';
  document.getElementById('copy-success').style.display='none';
  document.getElementById('review-modal').classList.add('open');
}
function closeReviewModal(){ document.getElementById('review-modal').classList.remove('open'); reviewTargetId=null; }

function saveReview(){
  const date=document.getElementById('review-input-date').value;
  if(!date){alert('Selecciona una fecha.');return;}
  const ch=changes.find(c=>c.id===reviewTargetId);
  ch.review=date;
  saveData(); closeReviewModal(); updateAll();
}

function generateSlackMsg(){
  const ch=changes.find(c=>c.id===reviewTargetId);
  const date=document.getElementById('review-input-date').value;
  if(!date){alert('Selecciona una fecha primero.');return;}
  const msg=buildSlackMsg(ch,date);
  document.getElementById('slack-msg-box').textContent=msg;
  document.getElementById('slack-msg-section').style.display='block';
}

function buildSlackMsg(ch,reviewDate){
  return `Programa un aviso de Slack para el ${formatDate(reviewDate)} a las 09:00. Mándamelo como DM a Virginia Roldán. El mensaje debe decir: "🔔 Revisión de pricing: hoy toca revisar el impacto de los cambios en ${ch.city} realizados el ${formatDate(ch.date)}."`;
}

function copySlackMsg(id){
  const ch=changes.find(c=>c.id===id);
  if(!ch||!ch.review){alert('Esta entrada no tiene fecha de revisión.');return;}
  const msg=buildSlackMsg(ch,ch.review);
  navigator.clipboard.writeText(msg).catch(()=>{
    prompt('Copia este mensaje:',msg);
  });
  // Show a brief toast
  const toast=document.createElement('div');
  toast.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#34D186;color:#000;padding:10px 20px;border-radius:8px;font-weight:600;font-size:13px;z-index:999;';
  toast.textContent='✓ Mensaje copiado — pégalo en el chat';
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),3000);
}

function clearReview(id){
  const ch=changes.find(c=>c.id===id);
  ch.review='';
  saveData(); updateAll();
}

// ── DAY MODAL ────────────────────────────────────────────────────────────────
function openDayModal(dateStr,dayChanges,dayReviews){
  document.getElementById('day-modal-title').textContent=formatDate(dateStr);
  const content=document.getElementById('day-modal-content');
  content.innerHTML='';
  if(dayReviews.length){
    dayReviews.forEach(ch=>{
      const d=document.createElement('div');
      d.className='review-alert'; d.style.marginBottom='12px';
      d.innerHTML=`<div class="review-alert-icon">🔔</div><div class="review-alert-body"><div class="review-alert-city" style="color:${getCityColor(ch.city)}">${ch.city}</div><div class="review-alert-date">Revisión programada hoy</div></div>`;
      content.appendChild(d);
    });
  }
  dayChanges.forEach(ch=>{
    const color=getCityColor(ch.city);
    const card=document.createElement('div'); card.className='change-card'; card.style.marginBottom='12px';
    card.innerHTML=`<div class="change-card-header"><div class="change-city-badge"><div style="width:10px;height:10px;border-radius:3px;background:${color}"></div><span style="color:${color}">${ch.city}</span></div></div><div class="change-notes">${ch.notes}</div>`;
    content.appendChild(card);
  });
  document.getElementById('day-modal').classList.add('open');
}
function closeDayModal(){ document.getElementById('day-modal').classList.remove('open'); }

// ── CITY FILTER ──────────────────────────────────────────────────────────────
function updateCityFilter(){
  const sel=document.getElementById('city-filter');
  const cur=sel.value;
  sel.innerHTML='<option value="">Todas</option>';
  uniqueCities().forEach(city=>{ const o=document.createElement('option'); o.value=city; o.textContent=city; if(city===cur)o.selected=true; sel.appendChild(o); });
  const dl=document.getElementById('cities-datalist'); dl.innerHTML='';
  uniqueCities().forEach(city=>{ const o=document.createElement('option'); o.value=city; dl.appendChild(o); });
}

function updateAll(){ updateCityFilter(); renderLegend(); renderCalendar(); renderRightPanel(); }

// ── EXPORT / IMPORT ──────────────────────────────────────────────────────────
function exportData(){
  const json = JSON.stringify(changes, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'pricing-tracker-data.json'; a.click();
  URL.revokeObjectURL(url);
}

function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if(!Array.isArray(imported)) throw new Error('Formato inválido');
      if(!confirm(`¿Importar ${imported.length} cambios? Esto reemplazará los datos actuales.`)) return;
      changes = imported;
      saveData();
      updateAll();
      const toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#34D186;color:#000;padding:10px 20px;border-radius:8px;font-weight:600;font-size:13px;z-index:999;';
      toast.textContent = `✓ ${imported.length} cambios importados`;
      document.body.appendChild(toast);
      setTimeout(()=>toast.remove(), 3000);
    } catch(err) {
      alert('Error al importar: ' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── REVISIONES TOGGLE ────────────────────────────────────────────────────────
let reviewsOpen = false;
function toggleReviews(){
  reviewsOpen = !reviewsOpen;
  const sec = document.getElementById('reviews-section');
  const arrow = document.getElementById('reviews-toggle');
  sec.style.display = reviewsOpen ? '' : 'none';
  arrow.style.transform = reviewsOpen ? '' : 'rotate(180deg)';
}

// Close on backdrop
document.getElementById('add-modal').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeAddModal(); });
document.getElementById('review-modal').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeReviewModal(); });
document.getElementById('day-modal').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeDayModal(); });

// Init
updateAll();
</script>
